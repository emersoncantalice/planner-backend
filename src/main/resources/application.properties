spring.application.name=planner-backend
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.locale=pt_BR

planner.data-dir=${PLANNER_DATA_DIR:data}
planner.auth.session-hours=12

# Hot reload backend (Spring DevTools)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Console logging: mais legivel com cores e menos ruido
spring.output.ansi.enabled=always
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx

# Foque nos logs da aplicacao, reduzindo verbosidade de framework
logging.level.root=INFO
logging.level.com.planner.backend=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
logging.level.org.apache.catalina.core=WARN

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
